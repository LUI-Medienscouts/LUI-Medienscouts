name: Supabase Keep Alive

on:
  schedule:
    # Führt das Skript jeden Tag um 08:00 Uhr UTC aus
    - cron: '0 8 * * *'
  # Erlaubt es, das Skript manuell über einen Button zu starten
  workflow_dispatch:

jobs:
  ping-supabase:
    runs-on: ubuntu-latest

    steps:
      - name: Query Supabase Table
        run: |
          echo "Frage Tabelle ab, um echte Datenbankaktivität zu erzeugen..."
          
          # Der curl-Befehl fragt exakt 1 Zeile (?select=*&limit=1) aus deiner Tabelle ab.
          # Bitte "DEINE_TABELLE" im Link durch einen echten Tabellennamen ersetzen!
          
          curl -s -o /dev/null -w "HTTP Status: %{http_code}\n" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
          "${{ secrets.SUPABASE_URL }}/rest/v1/keep_alive?select=*&limit=1"
